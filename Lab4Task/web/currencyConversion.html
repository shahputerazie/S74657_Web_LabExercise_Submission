<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Currency Conversion</title>
    </head>
    <body>
        <h2>Use JSP Declaration Tag, JSP Scriptlet and JSP Expression in Application</h2>
        <div class="card">
            <h3 class="form-title">Currency Conversion</h3>
            <form action="processCurrency.jsp" method="POST">
                <div class="form-group">
                    <label>Amount (in RM)</label>
                    <input type="number" name="amount" placeholder="In RM" required>
                </div>
                <div class="form-group">
                    <label>Convert to</label>
                    <select name="currencyType">
                        <option value="1">USD</option>
                        <option value="2">EURO</option>
                        <option value="3">JPY</option>
                        <option value="4">SGD</option>
                    </select>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn btn-submit">Submit</button>
                    <button type="reset" class="btn btn-cancel">Cancel</button>
                </div>
            </form>
        </div>
    </body>
</html>
